name: CI — Tests & Analyze

on:
  push:
    branches: [main, refactoring/full-restructure]
  pull_request:
    branches: [main]

jobs:
  # ── Уровень 1-2: Node.js тесты ──────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Node.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: loyalty-proxy/package.json

      - name: Install dependencies
        working-directory: loyalty-proxy
        run: npm ci

      - name: Run unit tests
        run: node tests/unit/critical_logic_test.js

      - name: Run integration tests
        run: node tests/integration/recount_flow_test.js

  # ── Уровень 3: Flutter analyze ───────────────────────────────────────────────
  flutter-analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos

  # ── Уровень 4: Flutter unit tests ────────────────────────────────────────────
  flutter-tests:
    name: Flutter Unit Tests
    runs-on: ubuntu-latest
    needs: flutter-analyze

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run Flutter tests
        run: flutter test --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flutter-coverage
          path: coverage/lcov.info
          retention-days: 7
